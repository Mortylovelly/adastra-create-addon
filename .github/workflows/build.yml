name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant permission
      run: chmod +x gradlew

    - name: Build
      run: ./gradlew build

    - name: Upload jar
      uses: actions/upload-artifact@v4
      with:
        name: adastra-create-addon
        path: build/libs/*.jar
